<div class="modal fade" id="createGroupModal" tabindex="-1" aria-labelledby="createGroupModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" style="border-bottom:1px solid var(--border);">
        <h5 class="modal-title" id="createGroupModalLabel"><i class="bi bi-people-fill"></i> Create a New Group</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form action="{{ url_for('main.create_group') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="modal-body" style="padding:1.5rem;">
          <div class="form-row-2">
            <div>
              <label class="form-label-sm">Group Name</label>
              <input class="form-input" type="text" name="group_name" placeholder="e.g. Summer Roadtrip" required/>
            </div>
            <div>
              <label class="form-label-sm">Currency</label>
              <select class="form-select" name="currency">
                <option value="AUD">AUD ($)</option>
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (&euro;)</option>
                <option value="GBP">GBP (&pound;)</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer" style="border-top:1px solid var(--border);">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn-primary-action">
            <i class="bi bi-plus-circle-fill"></i> Create Group
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SplitMate – Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .error-wrap {
      text-align: center;
      max-width: 420px;
      padding: 40px 24px;
    }

    .error-code {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 7rem;
      line-height: 1;
      color: var(--bg-card-alt);
      letter-spacing: -4px;
      user-select: none;
    }

    .error-code span { color: var(--accent); }

    .error-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--text-primary);
      margin: 16px 0 10px;
    }

    .error-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

<div class="error-wrap">
  <div class="error-code"><span>4</span>0<span>4</span></div>
  <div class="error-title">Page not found</div>
  <div class="error-sub">The page you're looking for doesn't exist or has been moved.</div>
  <a href="index.html" class="btn-primary-action" style="text-decoration:none">
    <i class="bi bi-house"></i> Back to Home
  </a>
</div>

</body>
</html>
